<!DOCTYPE html>
<html lang="ko" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0F1923" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Fluent" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet" />
    <title>Fluent</title>
    <style>
      /* 로딩 스크린 */
      #loading-screen {
        position: fixed;
        inset: 0;
        background: #0F1923;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #loading-screen.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #loading-logo {
        width: 64px;
        height: 64px;
        margin-bottom: 16px;
        animation: pulse-logo 1.5s ease-in-out infinite;
      }
      #loading-text {
        color: #4A9BA5;
        font-family: 'Inter', 'Pretendard Variable', sans-serif;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: -0.5px;
      }
      #loading-dots {
        margin-top: 24px;
        display: flex;
        gap: 6px;
      }
      #loading-dots span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #4A9BA5;
        animation: dot-bounce 1.2s ease-in-out infinite;
      }
      #loading-dots span:nth-child(2) { animation-delay: 0.15s; }
      #loading-dots span:nth-child(3) { animation-delay: 0.3s; }
      @keyframes pulse-logo {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.05); opacity: 0.8; }
      }
      @keyframes dot-bounce {
        0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
        40% { transform: scale(1); opacity: 1; }
      }
    </style>
  </head>
  <body class="bg-fluent-bg-dark text-fluent-text-primary">
    <!-- 로딩 스크린 -->
    <div id="loading-screen">
      <svg id="loading-logo" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <rect width="64" height="64" rx="12" fill="#1B2A4A"/>
        <path d="M16 16h24a4 4 0 0 1 0 8H24v8h12a4 4 0 0 1 0 8H24v8a4 4 0 0 1-8 0V16z" fill="#4A9BA5"/>
        <path d="M36 28c4 0 8 3 8 8s-4 8-8 8" stroke="#4A9BA5" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
      </svg>
      <div id="loading-text">Fluent</div>
      <div id="loading-dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
